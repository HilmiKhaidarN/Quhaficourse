const tabKeys = ['fikih','akidah','akhlak','qurdis','sejarah'];
let activeTab = 'fikih';

function renderCards(key) {
  document.getElementById('materiGrid').innerHTML = DATA[key].map(c => `
    <div class="materi-card" onclick="window.location.href='${c.href}'" style="cursor:pointer">
      <div class="materi-thumb" style="background:${c.bg};color:${c.color}">
        ${c.icon}<span class="thumb-badge">${c.bab}</span>
      </div>
      <div class="materi-body">
        <h4>${c.title}</h4>
        <p>${c.desc}</p>
        <div class="materi-pengajar">?? ${PENGAJAR[key]}</div>
        <div class="materi-footer">
          <div class="progress-bar"><div class="progress-fill ${c.fill}" style="width:${c.pct}%"></div></div>
          <span>${c.pct}%</span>
        </div>
      </div>
    </div>`).join('');
}

document.querySelectorAll('.materi-tab').forEach((tab, i) => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.materi-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderCards(tabKeys[i]);
  });
});
